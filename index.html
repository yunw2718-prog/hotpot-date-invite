<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>我们一起去约会吧</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,"Microsoft YaHei",sans-serif;color:#6d2635;background:linear-gradient(135deg,#fff0d6,#ffe1e5);min-height:100vh}main{min-height:100vh;display:grid;place-items:center;padding:24px}.screen{width:min(760px,100%);min-height:560px;padding:clamp(32px,7vw,80px);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border-radius:28px;background:#ffffffc9;box-shadow:0 20px 60px #8f334225}h1{font-size:clamp(38px,8vw,76px);margin:18px 0;line-height:1.2}h2{font-size:clamp(28px,5vw,48px);margin:12px 0 28px}.eyebrow{color:#b26873;letter-spacing:2px}.buttons{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:18px 0}.btn{border:0;border-radius:999px;padding:14px 24px;background:#fff;color:#8f2238;font-size:16px;cursor:pointer;box-shadow:0 8px 18px #7c263522}.btn.selected,.btn.primary{background:#8f2238;color:white}.btn:hover{transform:translateY(-2px)}.next{margin-top:28px}.flower{font-size:64px}.walk{background:linear-gradient(#fff7dfaa,#fff0e8cc),url('./public/date-meadow.png') center/cover}.date-input{padding:14px;border:1px solid #d89aa4;border-radius:12px;font-size:17px}.summary{line-height:2;font-size:18px}.done{font-size:clamp(42px,8vw,76px);font-weight:800}
</style></head>
<body><main id="app"></main>
<script>
const soups=['牛油红汤','番茄鸳鸯','菌汤鸳鸯','青花椒麻辣'];const dishes=['毛肚','鸭肠','黄喉','午餐肉','嫩牛肉','虾滑','酥肉','贡菜','豆皮','金针菇','土豆片','宽粉'];let step=0,soup=soups[0],picked=['毛肚','虾滑'],date='',time='18:00';
const app=document.querySelector('#app');const esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function render(){let body='';if(step===0)body='<div class="flower">🌷 🌿 🌷</div><p class="eyebrow">今天的计划已经准备好啦</p><h1>我们一起去约会吧！</h1><button class="btn primary next" onclick="step=1;render()">继续</button>';if(step===1)body='<p class="eyebrow">第一步</p><h2>我们去吃火锅</h2><p>请选择你喜欢的锅底与配菜</p><button class="btn primary next" onclick="step=2;render()">下一步</button>';if(step===2)body='<p class="eyebrow">重庆火锅</p><h2>选一个锅底和喜欢的菜</h2><div class="buttons">'+soups.map(x=>`<button class="btn ${x===soup?'selected':''}" onclick="soup='${x}';render()">${x}</button>`).join('')+'</div><div class="buttons">'+dishes.map(x=>`<button class="btn ${picked.includes(x)?'selected':''}" onclick="picked.includes('${x}')?picked=picked.filter(y=>y!=='${x}'):picked.push('${x}');render()">${x}</button>`).join('')+'</div><button class="btn primary next" onclick="step=3;render()">下一步</button>';if(step===3)body='<div class="walk"><h2>我们去散步吧</h2><p>饭后一起走走，聊聊天。</p><div class="buttons"><button class="btn primary" onclick="step=4;render()">接受</button><button id="no" class="btn" onclick="moveNo()">拒绝</button></div></div>';if(step===4)body='<p class="eyebrow">约会安排</p><h2>选择日期和时间</h2><input class="date-input" type="date" onchange="date=this.value"><div class="buttons">'+['17:30','18:00','18:30','19:00','19:30'].map(x=>`<button class="btn ${x===time?'selected':''}" onclick="time='${x}';render()">${x}</button>`).join('')+'</div><p class="summary">'+(date?'已选 '+date+' '+time:'请选择约会日期')+'</p><button class="btn primary next" onclick="date&&(step=5,render())">完成</button>';if(step===5)body='<div class="done">吃货就位。<br>快乐加倍。</div><button class="btn primary next" onclick="step=0;render()">再看一遍</button>';app.innerHTML='<section class="screen '+(step===3?'walk':'')+'">'+body+'</section>'}function moveNo(){let b=document.querySelector('#no');b.style.position='relative';b.style.left=(Math.random()*220-110)+'px';b.style.top=(Math.random()*120-60)+'px'}render();
</script></body></html>
